<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobra</title>
    <link rel="stylesheet" href="jogo.css">
</head>
<body>
    
    <!--HUD-->
    <div class="hud">
        <a href="index.html" class="btn-menu">MENU</a>
        <div class="hud-centro">
            <span class="label-hud">Pontuação</span>
            <span class="valor-hud" id="pontuação">0</span>
        </div>
        <div class="hud-direita">
            <span class="label-hud">Recorde</span>
            <span class="valor-hud" id="recorde">0</span>
        </div>
    </div>
    <!--GRID DO JOGO-->
    <div class="arena">
        <div class="grade" id="grade">
            
        </div>
        <!--GAME OVER-->
        <div class="overley" id="overley">
            <div class="overleu-conteudo">
                <p class="overley-titulo" id="overley-titulo">FIM DE JOGO</p>
                <p class="overley-pontos" id="overley-pontos">0 pontos</p>
                <p class="overley-recorde" id="overley-recorde"></p>
                <button class="btn-reiniciar" onclick="reiniciar()">Jogar Novamente</button>
                <a href="index.html" class="btn-voltar">Voltar ao menu</a>
            </div>
        </div>
    </div>
    <!--CONTROLE SMARTPHONE-->
    <div class="controles-smartphone">
        <div class="linha-controle">
            <button class="btn-direcao" onclick="mudarDirecar('ArrowUp')">▲</button>
        </div>
        <div class="linha-controle">
            <button class="btn-direcao" onclick="mudarDirecar('ArrowLeft')">◀</button>
            <button class="btn-direcao" onclick="mudarDirecar('ArrowDown')">▼</button>
            <button class="btn-direcao" onclick="mudarDirecar('ArrowRight')">▶</button>
        </div>
    </div>

    <script src="jogo.js"></script>
</body>
</html>
